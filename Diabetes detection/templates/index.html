<!DOCTYPE html>
<html>
<head>
    <title>Fingerprint Diabetes Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">
<div class="card p-4 shadow">

<h2 class="text-center mb-4">🧠 Fingerprint-Based Diabetes Prediction</h2>

<form action="/predict" method="post" enctype="multipart/form-data">

<div class="row">

<!-- Fingerprint Upload -->
<div class="col-md-6">
<h4>📸 Upload Fingerprint</h4>
<input type="file" name="fingerprint" class="form-control mb-3" required>
</div>

<!-- Clinical Data -->
<div class="col-md-6">
<h4>📊 Clinical Data</h4>

<input type="number" name="age" class="form-control mb-2" placeholder="Age" required>

<input type="number" step="0.1" name="bmi" class="form-control mb-2" placeholder="BMI" required>

<input type="number" step="0.1" name="hba1c" class="form-control mb-2" placeholder="HbA1c Level" required>

<input type="number" name="glucose" class="form-control mb-2" placeholder="Blood Glucose Level" required>

<select name="hypertension" class="form-control mb-2">
<option value="0">No Hypertension</option>
<option value="1">Hypertension</option>
</select>

<select name="heart_disease" class="form-control mb-2">
<option value="0">No Heart Disease</option>
<option value="1">Heart Disease</option>
</select>

<select name="gender" class="form-control mb-2">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<select name="smoking" class="form-control mb-2">
<option value="never">Never</option>
<option value="current">Current</option>
<option value="former">Former</option>
<option value="ever">Ever</option>
<option value="not current">Not Current</option>
</select>

</div>

</div>

<div class="text-center mt-4">
<button class="btn btn-primary btn-lg">🔍 Predict</button>
</div>

</form>

{% if prediction_text %}
<div class="alert alert-info text-center mt-4">
<h4>{{ prediction_text }}</h4>
<p>Confidence: {{ confidence }}</p>
</div>
{% endif %}

</div>
</div>

</body>
</html>
